server
{
    listen 80;
    listen 443 ssl;
    listen 443 quic;
    http2 on;
    server_name geo.allgood.cn;
    index index.php index.html index.htm default.php default.htm default.html;
    root /www/wwwroot/geo.allgood.cn;

    #CERT-APPLY-CHECK--START
    include /www/server/panel/vhost/nginx/well-known/geo.allgood.cn.conf;
    #CERT-APPLY-CHECK--END
    include /www/server/panel/vhost/nginx/extension/geo.allgood.cn/*.conf;

    #SSL-START
    #error_page 404/404.html;
    ssl_certificate /www/server/panel/vhost/cert/geo.allgood.cn/fullchain.pem;
    ssl_certificate_key /www/server/panel/vhost/cert/geo.allgood.cn/privkey.pem;
    ssl_protocols TLSv1.1 TLSv1.2 TLSv1.3;
    ssl_ciphers EECDH+CHACHA20:EECDH+CHACHA20-draft:EECDH+AES128:RSA+AES128:EECDH+AES256:RSA+AES256:EECDH+3DES:RSA+3DES:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_tickets on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    add_header Strict-Transport-Security "max-age=31536000";
    add_header Alt-Svc 'quic=":443"; h3=":443"; h3-29=":443"; h3-27=":443";h3-25=":443"; h3-T050=":443"; h3-Q050=":443";h3-Q049=":443";h3-Q048=":443"; h3-Q046=":443"; h3-Q043=":443"';
    error_page 497 https://$host$request_uri;
    #SSL-END

    # Keep the branded 404 page for web routes. PHP API responses are handled
    # by the regex location from enable-php-82.conf and retain their JSON body.
    location / {
        error_page 404 /404.html;
    }

    #PHP-INFO-START
    include enable-php-82.conf;
    #PHP-INFO-END

    #REWRITE-START
    include /www/server/panel/vhost/rewrite/geo.allgood.cn.conf;
    #REWRITE-END

    location ~ ^/(\.user.ini|\.htaccess|\.git|\.env|\.svn|\.project|LICENSE|README.md) {
        return 404;
    }

    location ~ \.well-known {
        allow all;
    }

    if ($uri ~ "^/\.well-known/.*\.(php|jsp|py|js|css|lua|ts|go|zip|tar\.gz|rar|7z|sql|bak)$") {
        return 403;
    }

    location ~ .*\.(gif|jpg|jpeg|png|bmp|swf)$ {
        expires 30d;
        error_log /dev/null;
        access_log off;
    }

    location ~ .*\.(js|css)?$ {
        expires 12h;
        error_log /dev/null;
        access_log off;
    }

    access_log /www/wwwlogs/geo.allgood.cn.log;
    error_log /www/wwwlogs/geo.allgood.cn.error.log;
}
