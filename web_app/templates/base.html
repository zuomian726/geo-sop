<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GEO-SOP{% endblock %}</title>
    
    <!-- Icon -->
    <link rel="icon" type="image/png" href="/static/img/geo-sop-icon.png">
    
    <!-- Element Plus CSS（本地） -->
    <link rel="stylesheet" href="/static/vendor/element-plus.css">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: #f5f7fa;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .el-tag--small {
            height: 24px !important;
            line-height: 22px !important;
        }
        {% block styles %}{% endblock %}
    </style>
</head>
<body>
    <div id="app">
        {% block content %}{% endblock %}
    </div>
    
    <!-- Vue 3（本地） -->
    <script src="/static/vendor/vue.global.js"></script>
    <!-- Element Plus（本地） -->
    <script src="/static/vendor/element-plus.js"></script>
    <!-- Element Plus Icons Vue（本地） -->
    <script src="/static/vendor/element-plus-icons-vue.js"></script>
    <!-- Axios（本地） -->
    <script src="/static/vendor/axios.min.js"></script>
    <!-- ECharts 图表库（本地） -->
    <script src="/static/vendor/echarts.min.js"></script>
    
    <script>
        const { createApp } = Vue;
        const { ElMessage, ElMessageBox } = ElementPlus;
        
        {% block scripts %}{% endblock %}
    </script>
</body>
</html>
