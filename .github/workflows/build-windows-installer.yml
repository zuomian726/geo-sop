name: Build Windows Installer

on:
  workflow_dispatch:
    inputs:
      app_version:
        description: "GEO-SOP version"
        required: true
        default: "0.3.15-dev"
  push:
    branches:
      - main
    paths:
      - "Install GEO-SOP.bat"
      - "Install GEO-SOP.ps1"
      - "Start GEO-SOP.bat"
      - "install.bat"
      - "run_windows_desktop.bat"
      - "build_windows_installer.bat"
      - "installer/windows/**"
      - "version.py"
      - ".github/workflows/build-windows-installer.yml"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build setup EXE
        shell: cmd
        env:
          APP_VERSION: ${{ github.event.inputs.app_version || '0.3.15-dev' }}
        run: build_windows_installer.bat

      - name: Verify installer
        shell: pwsh
        run: |
          $file = Get-ChildItem release\GEO-SOP-Setup-v*.exe | Select-Object -First 1
          if (-not $file) { throw "Installer EXE was not created." }
          Write-Host "Installer: $($file.FullName)"
          Write-Host "Size: $($file.Length)"
          Get-FileHash $file.FullName -Algorithm SHA256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GEO-SOP-Windows-Setup
          path: release/GEO-SOP-Setup-v*.exe
