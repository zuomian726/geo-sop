name: Build Windows Installer

on:
  workflow_dispatch:
    inputs:
      app_version:
        description: "Optional GEO-SOP version override (defaults to version.py)"
        required: false
        default: ""
  push:
    branches:
      - main
    paths:
      - "desktop_app.py"
      - "web_app/**"
      - "platforms/**"
      - "tools/**"
      - "requirements-desktop.txt"
      - "build_windows_exe.bat"
      - "Install GEO-SOP.bat"
      - "Install GEO-SOP.ps1"
      - "Start GEO-SOP.bat"
      - "install.bat"
      - "run_windows_desktop.bat"
      - "build_windows_installer.bat"
      - "installer/windows/**"
      - "tests/**"
      - "version.py"
      - ".github/workflows/build-windows-installer.yml"

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve application version
        shell: pwsh
        run: |
          $requestedVersion = "${{ github.event.inputs.app_version }}"
          if ([string]::IsNullOrWhiteSpace($requestedVersion)) {
            $requestedVersion = python -c "from version import APP_VERSION; print(APP_VERSION)"
          }
          if ([string]::IsNullOrWhiteSpace($requestedVersion)) {
            throw "Application version could not be resolved."
          }
          "APP_VERSION=$requestedVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Building GEO-SOP $requestedVersion"

      - name: Run unit tests
        shell: pwsh
        run: |
          python -m pip install -r requirements-desktop.txt
          python -m unittest discover -s tests -v

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build native desktop application
        shell: cmd
        env:
          CI: "1"
        run: build_windows_exe.bat

      - name: Verify bundled browser
        shell: pwsh
        run: |
          if (-not (Test-Path "dist\GEO-SOP\GEO-SOP.exe")) { throw "Native application was not created." }
          $browser = Get-ChildItem ".playwright-browsers" -Recurse -Filter "chrome.exe" | Select-Object -First 1
          if (-not $browser) { throw "Bundled Playwright Chromium was not found." }
          $env:PLAYWRIGHT_BROWSERS_PATH = (Resolve-Path ".playwright-browsers").Path
          $resolved = python -c "from browser_utils import _bundled_browser_candidates; paths = _bundled_browser_candidates(); assert paths, 'application browser resolver found no bundled Chromium'; print(paths[0])"
          if (-not (Test-Path $resolved)) { throw "Application browser resolver returned an invalid path: $resolved" }
          Write-Host "Chromium: $($browser.FullName)"
          Write-Host "Application resolver: $resolved"

      - name: Smoke test native application startup
        shell: pwsh
        run: |
          $bootLog = Join-Path $env:TEMP "geo_sop_boot.log"
          $smokeData = Join-Path $env:RUNNER_TEMP "geo-sop-smoke-data"
          Remove-Item $bootLog -Force -ErrorAction SilentlyContinue
          Remove-Item $smokeData -Recurse -Force -ErrorAction SilentlyContinue
          $env:GEO_DEBUG_BOOT = "1"
          $env:GEO_BOOT_LOG_PATH = $bootLog
          $env:GEO_FORCE_BROWSER = "1"
          $env:GEO_DATA_DIR = $smokeData
          $process = Start-Process "dist\GEO-SOP\GEO-SOP.exe" -PassThru
          try {
            $port = $null
            for ($attempt = 0; $attempt -lt 120; $attempt++) {
              if ($process.HasExited) {
                $log = if (Test-Path $bootLog) { Get-Content $bootLog -Raw } else { "boot log missing" }
                throw "Native application exited during startup. $log"
              }
              if (Test-Path $bootLog) {
                $log = Get-Content $bootLog -Raw
                if ($log -match "creating wsgi server 127\.0\.0\.1:(\d+)") {
                  $port = [int]$Matches[1]
                  break
                }
              }
              Start-Sleep -Seconds 1
            }
            if (-not $port) {
              $log = if (Test-Path $bootLog) { Get-Content $bootLog -Raw } else { "boot log missing" }
              throw "Native application did not report its local server port. $log"
            }

            $response = $null
            for ($attempt = 0; $attempt -lt 30; $attempt++) {
              try {
                $response = Invoke-WebRequest "http://127.0.0.1:$port/login" -UseBasicParsing -TimeoutSec 3
                if ($response.StatusCode -eq 200) { break }
              } catch {
                Start-Sleep -Seconds 1
              }
            }
            if (-not $response -or $response.StatusCode -ne 200) {
              throw "Native application login page was not reachable."
            }
            if ($response.Content -notmatch "GEO-SOP") {
              throw "Native application login page did not contain the product identity."
            }
            if (-not (Test-Path $smokeData)) {
              throw "Native application did not initialize its local data directory."
            }
            Write-Host "Native startup smoke test passed on port $port."
            Get-Content $bootLog
          } finally {
            if (-not $process.HasExited) { Stop-Process -Id $process.Id -Force }
          }

      - name: Build setup EXE
        shell: cmd
        env:
          CI: "1"
        run: build_windows_installer.bat

      - name: Verify installer
        shell: pwsh
        run: |
          $file = Get-ChildItem release\GEO-SOP-Setup-v*.exe | Select-Object -First 1
          if (-not $file) { throw "Installer EXE was not created." }
          Write-Host "Installer: $($file.FullName)"
          Write-Host "Size: $($file.Length)"
          if ($file.Length -lt 50000000) { throw "Installer is unexpectedly small; native runtime or Chromium may be missing." }
          Get-FileHash $file.FullName -Algorithm SHA256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: GEO-SOP-Windows-Setup
          path: release/GEO-SOP-Setup-v*.exe
